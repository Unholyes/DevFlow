<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="710" viewBox="0 0 1200 710" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFEDD5"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="710" rx="32" fill="url(#bg)"/>

  <text x="70" y="110" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="44" font-weight="700" fill="#0F172A">
    DevOps
  </text>
  <text x="70" y="155" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="20" font-weight="500" fill="#475569">
    CI/CD pipeline with feedback loops
  </text>

  <g transform="translate(70,210)">
    <rect x="0" y="0" width="1060" height="440" rx="18" fill="rgba(255,255,255,0.75)" stroke="rgba(148,163,184,0.35)"/>

    <g transform="translate(60,110)">
      <!-- Loop path -->
      <path d="M 220 120 C 220 45, 320 0, 410 0 L 740 0 C 860 0, 960 95, 960 215 C 960 335, 860 430, 740 430 L 410 430 C 300 430, 220 380, 220 310"
            stroke="#FB923C" stroke-width="18" fill="none" stroke-linecap="round"/>
      <path d="M 220 310 C 220 380, 160 430, 90 430 L 70 430" stroke="#FB923C" stroke-width="18" fill="none" stroke-linecap="round"/>
      <path d="M 70 430 L 110 400 L 110 460 Z" fill="#FB923C"/>

      <!-- Stages -->
      <g>
        <rect x="250" y="70" width="190" height="90" rx="18" fill="#FFEDD5" stroke="rgba(251,146,60,0.35)"/>
        <text x="278" y="125" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="800" fill="#0F172A">Build</text>
      </g>
      <g>
        <rect x="460" y="18" width="190" height="90" rx="18" fill="#DBEAFE" stroke="rgba(59,130,246,0.25)"/>
        <text x="488" y="73" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="800" fill="#0F172A">Test</text>
      </g>
      <g>
        <rect x="670" y="70" width="190" height="90" rx="18" fill="#DCFCE7" stroke="rgba(34,197,94,0.22)"/>
        <text x="698" y="125" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="800" fill="#0F172A">Deploy</text>
      </g>
      <g>
