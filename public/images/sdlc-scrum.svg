<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="710" viewBox="0 0 1200 710" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#CFFAFE"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="710" rx="32" fill="url(#bg)"/>

  <text x="70" y="110" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="44" font-weight="700" fill="#0F172A">
    Scrum
  </text>
  <text x="70" y="155" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="20" font-weight="500" fill="#475569">
    Sprint planning, daily sync, review, and retrospective
  </text>

  <g transform="translate(70,210)">
    <rect x="0" y="0" width="1060" height="440" rx="18" fill="rgba(255,255,255,0.75)" stroke="rgba(148,163,184,0.35)"/>

    <!-- Sprint board -->
    <g transform="translate(40,44)">
      <rect x="0" y="0" width="620" height="352" rx="18" fill="#FFFFFF" stroke="rgba(148,163,184,0.35)"/>
      <text x="24" y="42" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="800" fill="#0F172A">Sprint Board</text>

      <g transform="translate(24,70)">
        <rect x="0" y="0" width="170" height="250" rx="14" fill="#F1F5F9"/>
        <text x="14" y="30" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#334155">Backlog</text>
        <rect x="14" y="48" width="142" height="44" rx="10" fill="#E2E8F0"/>
        <rect x="14" y="104" width="120" height="12" rx="6" fill="#CBD5E1"/>
        <rect x="14" y="126" width="92" height="12" rx="6" fill="#CBD5E1"/>
        <rect x="14" y="160" width="142" height="44" rx="10" fill="#E2E8F0"/>
      </g>

      <g transform="translate(220,70)">
        <rect x="0" y="0" width="170" height="250" rx="14" fill="#DBEAFE"/>
        <text x="14" y="30" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#1E3A8A">In Sprint</text>
        <rect x="14" y="48" width="142" height="44" rx="10" fill="#BFDBFE"/>
        <rect x="14" y="104" width="110" height="12" rx="6" fill="#93C5FD"/>
        <rect x="14" y="160" width="142" height="44" rx="10" fill="#BFDBFE"/>
      </g>

      <g transform="translate(416,70)">
        <rect x="0" y="0" width="170" height="250" rx="14" fill="#DCFCE7"/>
        <text x="14" y="30" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#14532D">Done</text>
        <rect x="14" y="48" width="142" height="44" rx="10" fill="#BBF7D0"/>
        <rect x="14" y="104" width="96" height="12" rx="6" fill="#86EFAC"/>
        <rect x="14" y="160" width="142" height="44" rx="10" fill="#BBF7D0"/>
      </g>
    </g>

    <!-- Ceremonies -->
    <g transform="translate(700,44)">
      <rect x="0" y="0" width="320" height="352" rx="18" fill="#FFFFFF" stroke="rgba(148,163,184,0.35)"/>
      <text x="22" y="42" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="800" fill="#0F172A">Ceremonies</text>

      <g transform="translate(22,70)">
        <rect x="0" y="0" width="276" height="56" rx="14" fill="#CFFAFE"/>
        <text x="18" y="36" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="800" fill="#0F172A">Sprint Planning</text>

        <rect x="0" y="74" width="276" height="56" rx="14" fill="#E0F2FE"/>
        <text x="18" y="110" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="800" fill="#0F172A">Daily Stand-up</text>

        <rect x="0" y="148" width="276" height="56" rx="14" fill="#E0E7FF"/>
        <text x="18" y="184" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="800" fill="#0F172A">Sprint Review</text>

        <rect x="0" y="222" width="276" height="56" rx="14" fill="#F5D0FE"/>
        <text x="18" y="258" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="800" fill="#0F172A">Retrospective</text>
      </g>
    </g>
  </g>
</svg>

