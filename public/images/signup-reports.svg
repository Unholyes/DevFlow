        <text x="18" y="25" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#065F46">Velocity</text>
        <rect x="170" y="0" width="170" height="38" rx="19" fill="#ECFDF5"/>
        <text x="188" y="25" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#065F46">Cycle time</text>
        <rect x="360" y="0" width="170" height="38" rx="19" fill="#D1FAE5"/>
        <text x="378" y="25" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="800" fill="#065F46">Throughput</text>
