        <circle cx="40" cy="92" r="7" fill="#059669"/>
        <circle cx="300" cy="60" r="7" fill="#059669"/>
        <circle cx="560" cy="44" r="7" fill="#059669"/>
        <circle cx="820" cy="36" r="7" fill="#059669"/>
      </g>

      <!-- KPI chips -->
      <g transform="translate(28,198)">
